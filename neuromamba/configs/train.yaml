batch_size: 16
learning_rate: 3.0e-4
weight_decay: 1.0e-5
max_epochs: 100
warmup_epochs: 5
grad_clip: 1.0
window_size: 128      # T_ctx: number of timesteps per training window
window_stride: 64     # stride for sliding window over recordings
val_fraction: 0.15
test_fraction: 0.10
seed: 42
device: "cuda"
log_every_n_steps: 50
save_every_n_epochs: 10
# C gradient flow: whether to let gradients flow through C into predictive loss
detach_C_warmup_epochs: 10   # detach C for first N epochs, then unfreeze

lambda_recon: 1.0
lambda_pred: 1.0
lambda_decor: 0.1
lambda_var: 0.1
lambda_sparse: 0.05
lambda_timescale: 0.1
variance_gamma: 1.0       # target std floor for variance loss
timescale_margin: 0.1     # margin for fast > slow temporal delta

